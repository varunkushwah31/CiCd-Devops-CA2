name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: npm test

      - name: build docker
        run: docker build -t app .

      - name: run container test
        run: docker run -d -p 3000:3000 myapp